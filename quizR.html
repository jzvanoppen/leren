let activeList = entriesVocab;

document.getElementById("modeSelect").onchange = function() {
  activeList = (this.value === "vocab") ? entriesVocab : entriesVerbes;
  newQuestion();
};

function shuffle(a){
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function speakDutch(text){

  if('speechSynthesis' in window){

    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);

    u.lang = 'nl-BE';
    u.rate = 0.9;

    speechSynthesis.speak(u);
  }
}

const sentenceText = document.getElementById("sentenceText");
const choicesEl = document.getElementById("choices");
const feedbackEl = document.getElementById("feedback");

const scRight = document.getElementById("scRight");
const scWrong = document.getElementById("scWrong");

let current = null;
let answered = false;

function newQuestion(){

  answered = false;

  feedbackEl.textContent = "";

  current = activeList[Math.floor(Math.random() * activeList.length)];

  sentenceText.textContent = current.sentence;

  choicesEl.innerHTML = "";

  const opts = [current.answer];

  while(opts.length < 3){

    const r = activeList[Math.floor(Math.random() * activeList.length)].answer;

    if(!opts.includes(r)){
      opts.push(r);
    }
  }

  shuffle(opts);

  opts.forEach(o => {

    const b = document.createElement("button");

    b.className = "btn";
    b.textContent = o;

    b.onclick = () => checkAnswer(b, o);

    choicesEl.appendChild(b);
  });
}

function checkAnswer(btn, chosen){

  if(answered) return;

  answered = true;

  Array.from(choicesEl.children).forEach(b => b.disabled = true);

  const fullSentence = current.sentence.replace("_____", current.answer);

  if(chosen === current.answer){

    btn.classList.add("correct");

    feedbackEl.textContent = "Goed gedaan! 😊";

    scRight.textContent = Number(scRight.textContent) + 1;

  } else {

    btn.classList.add("incorrect");

    Array.from(choicesEl.children)
      .find(b => b.textContent === current.answer)
      .classList.add("correct");

    feedbackEl.textContent = "Oeps! Het juiste antwoord was: " + current.answer;

    scWrong.textContent = Number(scWrong.textContent) + 1;
  }

  // Spreek de volledige juiste zin uit
  speakDutch(fullSentence);
}

document.getElementById("nextBtn").onclick = function(){

  if(!answered){

    alert("Kies eerst een antwoord.");

    return;
  }

  newQuestion();
};
